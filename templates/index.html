<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bulk Image Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #00f2ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .wrapper { max-width: 1400px; margin: auto; }
        
        /* Input section optimized for large text */
        .input-header { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; }
        textarea { 
            width: 100%; height: 200px; background: #000; color: #00ff41; 
            border: 1px solid #444; border-radius: 8px; font-family: monospace;
            padding: 15px; box-sizing: border-box; resize: vertical;
        }
        
        .stats-bar { 
            display: flex; justify-content: space-between; align-items: center;
            margin: 20px 0; padding: 15px; background: rgba(0, 242, 255, 0.1);
            border-left: 5px solid var(--accent); border-radius: 4px;
        }

        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        .img-card { 
            background: var(--card); border-radius: 8px; overflow: hidden;
            border: 1px solid #222; position: relative;
        }
        /* Fixed height for cards to keep grid stable during heavy loads */
        .img-card img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        
        .download-btn { 
            position: absolute; bottom: 5px; right: 5px; background: var(--accent);
            color: #000; border: none; padding: 5px 10px; border-radius: 4px;
            cursor: pointer; font-size: 10px; font-weight: bold;
        }

        .btn-zip { 
            background: #32ff7e; color: #000; padding: 12px 25px; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-extract {
            background: var(--accent); color: #000; padding: 12px 25px;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="input-header">
            <h2>📦 Bulk SRC Extractor (High Capacity)</h2>
            <form method="POST">
                <textarea name="html_input" placeholder="Paste your 'long long' HTML code here..."></textarea>
                <input type="text" name="url_input" placeholder="Website URL (optional)" style="width:100%; padding:12px; margin-top:10px; background:#000; color:#fff; border:1px solid #444; border-radius:8px;">
                <button type="submit" class="btn-extract">EXTRACT ALL IMAGES</button>
            </form>
        </div>

        {% if links %}
        <div class="stats-bar">
            <span><strong>Total Detected:</strong> {{ links|length }} images</span>
            <button class="btn-zip" onclick="downloadAll()">Download Everything as .ZIP</button>
        </div>

        <div class="gallery">
            {% for link in links %}
            <div class="img-card">
                <img src="{{ link }}" loading="lazy" onerror="this.closest('.img-card').style.display='none';">
                <button class="download-btn" onclick="downloadSingle('{{ link }}')">Save</button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <script>
        async function downloadSingle(url) {
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = url.split('/').pop().split('?')[0] || 'image.jpg';
                a.click();
            } catch(e) { window.open(url, '_blank'); }
        }

        async function downloadAll() {
            const zip = new JSZip();
            const imgElements = Array.from(document.querySelectorAll('.img-card img'));
            const total = imgElements.length;
            
            if(!confirm(`Prepare ZIP for ${total} images? This might take a while.`)) return;

            for (let i = 0; i < total; i++) {
                const url = imgElements[i].src;
                try {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    const name = `img_${i}_` + (url.split('/').pop().split('?')[0] || 'file.jpg');
                    zip.file(name, blob);
                } catch(e) { console.log("Skipped " + url); }
            }

            const content = await zip.generateAsync({type: "blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = "bulk_images.zip";
            a.click();
        }
    </script>
</body>
</html>
